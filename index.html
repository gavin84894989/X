<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北捷遺失物任務 - 修正版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000;
            padding: 20px; text-align: center; pointer-events: auto;
        }
        #dialog-text {
            font-size: 28px; line-height: 1.6; max-width: 85%;
            text-shadow: 2px 2px 5px rgba(255,0,0,0.8); font-weight: bold;
        }
        #inventory-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 3000; display: none; flex-direction: column; align-items: center; width: 90%;
        }
        #btn-bag-main {
            background: #442200; border: 3px solid #ffd700; color: white;
            padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 10px;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }
        #tools-list { display: none; gap: 10px; width: 100%; margin-top: 10px; }
        .tool {
            background: rgba(30, 30, 30, 0.9); border: 2px solid #888; color: #ccc;
            padding: 15px 5px; font-size: 15px; cursor: pointer; flex: 1; text-align: center;
        }
        #btn-flashlight { border-color: #00ff00; color: white; font-weight: bold; box-shadow: 0 0 10px #00ff00; }
        #option-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border: 3px solid #ff4444;
            display: none; z-index: 3500; width: 85%; text-align: center;
        }
        .opt-btn {
            display: block; width: 100%; padding: 18px; margin: 12px 0;
            font-size: 22px; background: #222; color: white; border: 1px solid white; cursor: pointer;
        }
        #full-screen-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 4000; object-fit: contain; background: black;
        }
    </style>
</head>
<body>

<div id="overlay"><div id="dialog-text">【 點擊開始任務 】</div></div>

<div id="inventory-container">
    <div id="btn-bag-main">🧳 開啟配件包</div>
    <div id="tools-list">
        <div class="tool">一字起子</div>
        <div class="tool">鉤子</div>
        <div class="tool">備用鑰匙</div>
        <div id="btn-flashlight" class="tool">🔦 手電筒</div>
    </div>
</div>

<div id="btn-goto-carriage" style="display:none; position:fixed; top:20px; right:20px; background:#880000; color:white; padding:15px 25px; cursor:pointer; z-index:4000; border:2px solid white; font-size:20px; font-weight:bold;">
    前往車廂巡視 ➔
</div>
<div id="option-menu"></div>
<img id="full-screen-img" src="">

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    // 強制將攝影機抬高至 1.6 公尺 (人眼高度)
    camera.position.set(0, 1.6, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const loader = new GLTFLoader();
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // --- B. 燈光優化 (恢復恐怖感) ---
    const flashlight = new THREE.SpotLight(0xffffff, 0); 
    flashlight.angle = Math.PI / 5;  // 縮小光束角度，集中視線
    flashlight.penumbra = 0.3;       // 邊緣柔化
    flashlight.distance = 100;       // 限制探照距離
    flashlight.decay = 1;            // 增加光線衰減
    scene.add(flashlight);
    scene.add(flashlight.target);

    // 泛光與環境光調暗
    const fillLight = new THREE.PointLight(0xffffff, 0, 100);
    scene.add(fillLight);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.02); // 調整為極弱光 0.02
    scene.add(ambientLight);

    const bgm = new Audio('./bgm.mp3'); bgm.loop = true;
    const cry = new Audio('./cry.mp3'); cry.loop = true;
    const radio = new Audio('./radio.mp3');
    const successSnd = new Audio('./success.mp3');
    const scareSnd = new Audio('./SCARE.mp3');

    let cockpit, carriage, counter, assistant, doll;
    let gameState = "INTRO";
    let shineCount = 0;

    // 載入模型
    loader.load('./駕駛室.glb', (g) => { cockpit = g.scene; cockpit.visible = false; cockpit.traverse(n => { if(n.isMesh) n.material.side = THREE.DoubleSide; }); scene.add(cockpit); }, undefined, () => alert("找不到 駕駛室.glb"));
    loader.load('./scene.glb', (g) => { carriage = g.scene; carriage.visible = false; carriage.traverse(n => { if(n.isMesh) n.material.side = THREE.DoubleSide; }); scene.add(carriage); }, undefined, () => alert("找不到 scene.glb"));
    loader.load('./櫃檯.glb', (g) => { counter = g.scene; counter.visible = false; counter.position.set(0, 0, -100); counter.traverse(n => { if(n.isMesh) n.material.side = THREE.DoubleSide; }); scene.add(counter); }, undefined, () => alert("找不到 櫃檯.glb"));

// --- 修正娃娃座標與大小 ---
    const dollTex = new THREE.TextureLoader().load('./doll.png');
    doll = new THREE.Sprite(new THREE.SpriteMaterial({ map: dollTex, transparent: true }));
    
    // 1. 調整比例：維持 2816:1536 的原圖真實長寬比 (1.833 : 1)
    // 放大係數設定為 2，所以寬度是 1.833 * 2 = 3.66，高度是 2
    doll.scale.set(3.66, 2, 1); 
    
    // 2. 調整位置：(X左右, Y上下, Z前後)
    // X 設定為 1.5 (正中央偏右)
    // Y 設定為 1.6 (與攝影機/人眼同高)
    // Z 設定為 -4  (距離玩家前方 4 公尺)
    doll.position.set(1.5, 1.6, -4); 
    
    doll.visible = false; // 強制先設為 true 測試，確認看得到後再改回 false 走遊戲躲貓貓邏輯
    scene.add(doll);

    // --- 修正助理座標與大小 ---
    const asstTex = new THREE.TextureLoader().load('./助理.png');
    assistant = new THREE.Sprite(new THREE.SpriteMaterial({ map: asstTex }));
    assistant.scale.set(1.5, 3, 1); 
    // 置中於攝影機前方 3 公尺 (櫃檯基準 Z: -100，所以放在 -103)，與人眼同高
    assistant.position.set(0, 1.6, -103); 
    assistant.visible = false;
    scene.add(assistant);

    // 流程控制
    const overlay = document.getElementById('overlay'), dialogText = document.getElementById('dialog-text'), invContainer = document.getElementById('inventory-container'), btnBagMain = document.getElementById('btn-bag-main'), toolsList = document.getElementById('tools-list');

    overlay.addEventListener('click', () => {
        if (gameState === "INTRO") {
            gameState = "DREAMING"; bgm.play();
            showText("我是誰？我怎麼會在這裡？", 2000, () => {
                showText("這裡好像是袋形軌，<br>我先找看看配件包有沒有什麼可以幫助我的。", 3000, () => {
                    overlay.style.display = "none"; invContainer.style.display = "flex"; cockpit.visible = true; gameState = "BAG_SEARCH";
                });
            });
        }
    });

    btnBagMain.addEventListener('click', () => {
        btnBagMain.style.display = "none"; toolsList.style.display = "flex";
        showText("裡面有一字起、鉤子、鑰匙...<br>拿出手電筒看看吧。", 2500);
    });

    document.getElementById('btn-flashlight').addEventListener('click', () => {
        flashlight.intensity = 30; // 降低主光強度，維持恐怖感
        fillLight.intensity = 1.5; // 泛光僅作微弱補光
        invContainer.style.display = "none";
        
        showText("開啟手電筒了。試著晃動螢幕觀察四周...", 5000, () => {
            showText("對了！我得折返檢視。", 2500, () => {
                overlay.style.display = "none"; document.getElementById('btn-goto-carriage').style.display = "block";
            });
        });
    });

    document.getElementById('btn-goto-carriage').addEventListener('click', () => {
        document.getElementById('btn-goto-carriage').style.display = "none";
        cockpit.visible = false; carriage.visible = true;
        camera.position.set(0, 1.6, 0); 
        gameState = "CARRIAGE";
        doll.visible = true; // 進入車廂立刻顯示娃娃
        cry.play();
    });

    // 互動核心
    function animate() {
        requestAnimationFrame(animate);
        if (gameState !== "INTRO") {
            flashlight.position.copy(camera.position);
            flashlight.target.position.set(camera.position.x + mouse.x * 10, camera.position.y + mouse.y * 10, camera.position.z - 10);

            if (gameState === "CARRIAGE") {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(doll);
                
                // 新機制：首次照到時觸發 Jumpscare (瞬間放大 + 嚇人音效)
                if (intersects.length > 0) {
                    if (shineCount === 0) {
                        shineCount = 1; // 標記已觸發過初次驚嚇
                        scareSnd.currentTime = 0; // 確保音效從頭播放
                        scareSnd.play();
                        
                        // 娃娃瞬間放大貼近螢幕
                        doll.scale.set(7.32, 4, 1); // 放大兩倍
                        doll.position.set(0, 1, -1); // 瞬間拉近到面前
                        
                        // 0.3 秒後恢復原狀
                        setTimeout(() => {
                            doll.scale.set(3.66, 2, 1);
                            doll.position.set(1.5, 1.6, -4);
                        }, 300);
                    }
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    const updateMouse = (x, y) => { mouse.x = (x / window.innerWidth) * 2 - 1; mouse.y = -(y / window.innerHeight) * 2 + 1; };
    window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => updateMouse(e.touches[0].clientX, e.touches[0].clientY));

    window.addEventListener('click', (e) => {
        if (gameState === "CARRIAGE") {
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObject(doll).length > 0) {
                // 只要點到娃娃，就直接進入 SOP 選單
                cry.pause(); 
                showSOP(); 
            }
        } else if (gameState === "COUNTER") {
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObject(assistant).length > 0) {
                endGame("SUCCESS", "完整遺失物撿拾流程，也完整旅客的笑容");
            }
        }
    });

    function showText(txt, delay, cb) {
        overlay.style.display = "flex"; dialogText.innerHTML = txt;
        if (delay) { setTimeout(() => { overlay.style.display = "none"; if (cb) cb(); }, delay); }
    }

    function showSOP() {
        gameState = "MENU"; document.getElementById('option-menu').style.display = "block";
        document.getElementById('option-menu').innerHTML = `
            <h2 style="color:red">你要怎麼處理這個遺失物？</h2>
            <button class="opt-btn" onclick="handleSOP(1)">1. 好詭異，但還是通報行控好了</button>
            <button class="opt-btn" onclick="handleSOP(2)">2. 把它放回去當作沒看到</button>
            <button class="opt-btn" onclick="handleSOP(3)">3. 好可愛~偷偷撿回去</button>
        `;
    }

    window.handleSOP = (id) => {
        document.getElementById('option-menu').style.display = "none";
        if (id === 1) {
            showText("(呼叫OCC，大安袋形軌112拾獲一個人型娃娃，請問是否有旅客協尋？)", 3000, () => {
                radio.play();
                showText("(OCC收到，目前無旅客協尋，依規定帶回車班處理)", 3000, () => {
                    carriage.visible = false; counter.visible = true; assistant.visible = true;
                    camera.position.set(0, 1.6, -100); gameState = "COUNTER";
                    showText("終於下車了，把遺失物交給助理然後填寫任務結束檢核吧", 3000);
                });
            });
        } else if (id === 2) endGame("SCARE", "你明明有看到我！！！！！！！");
        else endGame("SCARE", "我才不要跟你回家！！！！！！");
    };

    function endGame(type, txt) {
        bgm.pause(); const img = document.getElementById('full-screen-img');
        if (type === "SCARE") {
            scareSnd.currentTime = 0;
            scareSnd.play();
            img.src = "./doll2.png"; img.style.display = "block"; alert(txt);
        } else {
            successSnd.play(); img.src = "./成功圖片.png"; img.style.display = "block"; // 🔽 加入兩段文字，利用 <br> 換行，並稍微調大字體
            showText(`<span style="font-size: 36px; color: #ffeb3b;">謝謝你幫我找到我的玩具！</span><br><br>${txt}`, null);
        }
        setTimeout(() => {
            const b = document.createElement('button'); b.innerHTML = "再試一次";
            b.style = "position:fixed; bottom:10%; left:50%; transform:translateX(-50%); padding:20px 40px; font-size:24px; z-index:5000;";
            b.onclick = () => location.reload(); document.body.appendChild(b);
        }, 2000);
    }

    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>
