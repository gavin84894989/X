<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北捷遺失物任務 - 修正版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }

        /* 黑色全屏覆蓋層 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000;
            padding: 20px; text-align: center; pointer-events: auto;
        }

        #dialog-text {
            font-size: 28px; line-height: 1.6; max-width: 85%;
            text-shadow: 2px 2px 5px rgba(255,0,0,0.8); font-weight: bold;
        }

        /* 改良版配件包 UI */
        #inventory-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 3000; display: none; flex-direction: column; align-items: center; width: 90%;
        }
        
        /* 初始的大包包按鈕 */
        #btn-bag-main {
            background: #442200; border: 3px solid #ffd700; color: white;
            padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 10px;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        /* 點開後顯示的工具列 */
        #tools-list {
            display: none; gap: 10px; width: 100%; margin-top: 10px;
        }
        .tool {
            background: rgba(30, 30, 30, 0.9); border: 2px solid #888; color: #ccc;
            padding: 15px 5px; font-size: 15px; cursor: pointer; flex: 1; text-align: center;
        }
        #btn-flashlight { border-color: #00ff00; color: white; font-weight: bold; box-shadow: 0 0 10px #00ff00; }

        /* 選項選單 */
        #option-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border: 3px solid #ff4444;
            display: none; z-index: 3500; width: 85%; text-align: center;
        }
        .opt-btn {
            display: block; width: 100%; padding: 18px; margin: 12px 0;
            font-size: 22px; background: #222; color: white; border: 1px solid white; cursor: pointer;
        }

        /* 結局畫面 */
        #full-screen-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 4000; object-fit: contain; background: black;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div id="dialog-text">【 點擊開始任務 】</div>
</div>

<!-- 改良版配件包結構 -->
<div id="inventory-container">
    <div id="btn-bag-main">🧳 開啟配件包</div>
    <div id="tools-list">
        <div class="tool">一字起子</div>
        <div class="tool">鉤子</div>
        <div class="tool">備用鑰匙</div>
        <div id="btn-flashlight" class="tool">🔦 手電筒</div>
    </div>
</div>
<!-- 新增：手動切換到車廂的按鈕 -->
<div id="btn-goto-carriage" style="display:none; position:fixed; top:20px; right:20px; background:#880000; color:white; padding:15px 25px; cursor:pointer; z-index:4000; border:2px solid white; font-size:20px; font-weight:bold;">
    前往車廂巡視 ➔
</div>
<div id="option-menu"></div>
<img id="full-screen-img" src="">

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

    // --- A. 基本設定 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    // 強制將攝影機抬高至 1.6 公尺 (人眼高度)
    camera.position.set(0, 1.6, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const loader = new GLTFLoader();
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // --- B. 燈光與音效 ---
    const flashlight = new THREE.SpotLight(0xffffff, 0); 
    flashlight.angle = Math.PI / 6;  // 光束角度 (稍微調大一點點，避免視野太窄)
    flashlight.penumbra = 0.5;       // 邊緣柔化 (0.5 會讓光圈邊緣有真實手電筒的漸層散開效果)
    flashlight.distance = 40;        // 照射距離 (距離 30 之外絕對黑暗)
    flashlight.decay = 2;            // 光線衰減率 (物理光照真實衰減，越遠越暗)
    scene.add(flashlight);
    scene.add(flashlight.target);

    const bgm = new Audio('./bgm.mp3'); bgm.loop = true;
    const cry = new Audio('./cry.mp3'); cry.loop = true;
    const radio = new Audio('./radio.mp3');
    const successSnd = new Audio('./success.mp3');

    // 資源變數
    let cockpit, carriage, counter, assistant, doll;
    let gameState = "INTRO";
    let shineCount = 0;

    // --- B-1. 加入極微弱環境光保底 (0.05 強度) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
    scene.add(ambientLight);

    // --- B-2. 載入模型 (加入錯誤回報 Alert) ---
    loader.load('./scene(1).glb', (g) => { 
        cockpit = g.scene; 
        cockpit.visible = false; 
        cockpit.traverse(n => { if(n.isMesh) n.material.side = THREE.DoubleSide; });
        scene.add(cockpit); 
    }, undefined, (error) => { alert("錯誤：找不到駕駛室 scene(1).glb"); });
    
    loader.load('./scene.glb', (g) => { 
        carriage = g.scene; 
        carriage.visible = false; 
        carriage.traverse(n => { if(n.isMesh) n.material.side = THREE.DoubleSide; });
        scene.add(carriage); 
    }, undefined, (error) => { alert("錯誤：找不到車廂 scene.glb"); });
    
    loader.load('./scene(2).glb', (g) => { 
        counter = g.scene; 
        counter.visible = false; 
        // 櫃檯 Y 軸也建議不要是 0，預設先放好
        counter.position.set(0, 0, -100);
        counter.traverse(n => { if(n.isMesh) n.material.side = THREE.DoubleSide; });
        scene.add(counter); 
    }, undefined, (error) => { alert("錯誤：找不到櫃檯 scene(2).glb"); });

    const dollTex = new THREE.TextureLoader().load('./doll.png');
    doll = new THREE.Sprite(new THREE.SpriteMaterial({ map: dollTex, transparent: true }));
    doll.scale.set(0.4, 0.4, 1);
    doll.position.set(0.5, -0.6, -1.2);
    doll.visible = false;
    scene.add(doll);

    const asstTex = new THREE.TextureLoader().load('./助理.png');
    assistant = new THREE.Sprite(new THREE.SpriteMaterial({ map: asstTex }));
    assistant.scale.set(1, 2, 1);
    assistant.position.set(0, -0.2, -101.5);
    assistant.visible = false;
    scene.add(assistant);

    // --- C. 流程控制 ---

    const overlay = document.getElementById('overlay');
    const dialogText = document.getElementById('dialog-text');
    const invContainer = document.getElementById('inventory-container');
    const btnBagMain = document.getElementById('btn-bag-main');
    const toolsList = document.getElementById('tools-list');

    // 1. 開始點擊
    overlay.addEventListener('click', () => {
        if (gameState === "INTRO") {
            gameState = "DREAMING";
            bgm.play();
            showText("我是誰？我怎麼會在這裡？", 2000, () => {
                showText("這裡好像是袋形軌，<br>我先找看看配件包有沒有什麼可以幫助我的。", 3000, () => {
                    overlay.style.display = "none";
                    invContainer.style.display = "flex";
                    cockpit.visible = true;
                    gameState = "BAG_SEARCH";
                });
            });
        }
    });

    // 2. 點擊配件包
    btnBagMain.addEventListener('click', () => {
        btnBagMain.style.display = "none";
        toolsList.style.display = "flex";
        showText("裡面有一字起、鉤子、鑰匙...<br>拿出手電筒看看吧。", 2500);
    });

// 3. 點擊手電筒 (駕駛室探照階段)
document.getElementById('btn-flashlight').addEventListener('click', () => {
        flashlight.intensity = 15;
        invContainer.style.display = "none";
        
        // 提示字出現後即隱藏黑屏，讓玩家可以在 scene(1).glb 駕駛室自由探照
        showText("開啟手電筒了。試著晃動螢幕觀察四周...", 3000, () => {
            showText("對了！我得折返檢視。", 2500, () => {
                overlay.style.display = "none"; 
                // 顯示前往車廂的按鈕，將主導權交還給玩家
                document.getElementById('btn-goto-carriage').style.display = "block";
            });
        });
    });

    // 4. 點擊前往車廂 (手動切換場景)
    document.getElementById('btn-goto-carriage').addEventListener('click', () => {
        document.getElementById('btn-goto-carriage').style.display = "none";
        // 跳轉至車廂 scene.glb
        cockpit.visible = false;
        carriage.visible = true;
        camera.position.set(0, 1.6, 0); // 確保攝影機座標重置
        gameState = "CARRIAGE";
        doll.visible = true;
        cry.play();
    });

    // --- D. 互動核心 ---

    function animate() {
        requestAnimationFrame(animate);
        if (gameState !== "INTRO") {
            // 手電筒精準跟隨
            flashlight.position.copy(camera.position);
            // 修正 target 的計算，確保以相機為中心投射
            flashlight.target.position.set(
                camera.position.x + mouse.x * 10, 
                camera.position.y + mouse.y * 10, 
                camera.position.z - 10
            );

            if (gameState === "CARRIAGE") {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(doll);
                if (intersects.length > 0) {
                    if (shineCount < 3) doll.visible = false;
                    else doll.visible = true;
                } else {
                    if (shineCount < 3) doll.visible = true;
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    // 座標抓取
    const updateMouse = (x, y) => {
        mouse.x = (x / window.innerWidth) * 2 - 1;
        mouse.y = -(y / window.innerHeight) * 2 + 1;
    };
    window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => updateMouse(e.touches[0].clientX, e.touches[0].clientY));

    // 點擊判定
    window.addEventListener('click', (e) => {
        if (gameState === "CARRIAGE") {
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObject(doll).length > 0) {
                if (shineCount < 3) shineCount++;
                else { cry.pause(); showSOP(); }
            }
        } else if (gameState === "COUNTER") {
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObject(assistant).length > 0) {
                endGame("SUCCESS", "完整遺失物撿拾流程，也完整旅客的笑容");
            }
        }
    });

    // --- E. 工具函式 ---

    function showText(txt, delay, cb) {
        overlay.style.display = "flex";
        dialogText.innerHTML = txt;
        if (delay) {
            setTimeout(() => {
                overlay.style.display = "none";
                if (cb) cb();
            }, delay);
        }
    }

    function showSOP() {
        gameState = "MENU";
        const menu = document.getElementById('option-menu');
        menu.style.display = "block";
        menu.innerHTML = `
            <h2 style="color:red">你要怎麼處理這個遺失物？</h2>
            <button class="opt-btn" onclick="handleSOP(1)">1. 好詭異，但還是通報行控好了</button>
            <button class="opt-btn" onclick="handleSOP(2)">2. 把它放回去當作沒看到</button>
            <button class="opt-btn" onclick="handleSOP(3)">3. 好可愛~偷偷撿回去</button>
        `;
    }

    window.handleSOP = (id) => {
        document.getElementById('option-menu').style.display = "none";
        if (id === 1) {
            showText("(呼叫OCC，大安袋形軌112拾獲一個人型娃娃，請問是否有旅客協尋？)", 3000, () => {
                radio.play();
                showText("(OCC收到，目前無旅客協尋，依規定帶回車班處理)", 3000, () => {
                    carriage.visible = false; counter.visible = true; assistant.visible = true;
                    camera.position.set(0, 1.6, -100);
                    gameState = "COUNTER";
                    showText("終於下車了，把遺失物交給助理然後填寫任務結束檢核吧", 3000);
                });
            });
        } else if (id === 2) endGame("SCARE", "你明明有看到我！！！！！！！");
        else endGame("SCARE", "我才不要跟你回家！！！！！！");
    };

    function endGame(type, txt) {
        bgm.pause();
        const img = document.getElementById('full-screen-img');
        if (type === "SCARE") {
            img.src = "./doll2.png";
            img.style.display = "block";
            alert(txt); // 簡單粗暴的提示
        } else {
            successSnd.play();
            img.src = "./成功圖片.png";
            img.style.display = "block";
            showText(txt, null);
        }
        setTimeout(() => {
            const b = document.createElement('button');
            b.innerHTML = "再試一次";
            b.style = "position:fixed; bottom:10%; left:50%; transform:translateX(-50%); padding:20px 40px; font-size:24px; z-index:5000;";
            b.onclick = () => location.reload();
            document.body.appendChild(b);
        }, 2000);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
